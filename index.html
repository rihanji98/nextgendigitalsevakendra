<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - NextGen Seva</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 220px;
  background: #1e293b;
  color: white;
  height: 100vh;
  padding: 20px;
}

.sidebar h2 {
  text-align: center;
}

.menu {
  margin-top: 30px;
}

.menu div {
  padding: 12px;
  margin: 8px 0;
  background: #334155;
  border-radius: 8px;
  cursor: pointer;
}

.menu div:hover {
  background: #007bff;
}

/* Main */
.main {
  flex: 1;
  background: #f1f5f9;
  padding: 20px;
}

/* Cards */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
  gap: 15px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* Form */
.form-box {
  background: white;
  padding: 20px;
  margin-top: 20px;
  border-radius: 10px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}

button {
  background: #007bff;
  color: white;
  padding: 10px;
  border: none;
  width: 100%;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="sidebar">
  <h2>CSC Panel</h2>

  <div class="menu">
    <div onclick="showPage('dashboard')">Dashboard</div>
    <div onclick="showPage('apply')">Apply Service</div>
    <div onclick="showPage('users')">Users</div>
    <div onclick="showPage('reports')">Reports</div>
  </div>
</div>

<div class="main">

  <!-- Dashboard -->
  <div id="dashboardPage">
    <h2>Dashboard</h2>
    <div class="cards">
      <div class="card">Total Users: 120</div>
      <div class="card">Applications: 80</div>
      <div class="card">Pending: 25</div>
      <div class="card">Completed: 55</div>
    </div>
  </div>

  <!-- Apply -->
  <div id="applyPage" style="display:none;">
    <h2>Apply Service</h2>

    <div class="form-box">
      <input type="text" placeholder="Full Name">
      <input type="text" placeholder="Mobile Number">

      <select>
        <option>Select Service</option>
        <option>PAN Card</option>
        <option>Aadhaar</option>
        <option>Income Certificate</option>
      </select>

      <button onclick="submitForm()">Submit</button>
    </div>
  </div>

  <!-- Users -->
  <div id="usersPage" style="display:none;">
    <h2>Users</h2>
    <div class="card">User List Coming Soon...</div>
  </div>

  <!-- Reports -->
  <div id="reportsPage" style="display:none;">
    <h2>Reports</h2>
    <div class="card">Reports Coming Soon...</div>
  </div>

</div>

<script>
function showPage(page) {
  document.getElementById("dashboardPage").style.display = "none";
  document.getElementById("applyPage").style.display = "none";
  document.getElementById("usersPage").style.display = "none";
  document.getElementById("reportsPage").style.display = "none";

  document.getElementById(page + "Page").style.display = "block";
}

function submitForm() {
  alert("Application Submitted Successfully!");
}
</script>

</body>
</html>
